<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glossary | Bioinformatics Docs</title>
    <link rel="stylesheet" href="./dist/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      body { font-family: "Inter", sans-serif; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background-color: #94a3b8; border-radius: 4px; }
      * { scrollbar-width: thin; scrollbar-color: #94a3b8 transparent; }
    </style>
  </head>
  <body class="bg-white text-slate-900 min-h-screen overflow-y-auto overflow-x-hidden flex flex-col">
    <!-- Subtle Gradient Background -->
    <div class="absolute top-0 z-[-2] h-screen w-full bg-white bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(120,119,198,0.3),rgba(255,255,255,0))]"></div>

    <!-- Main Content Wrapper -->
    <div class="w-full flex flex-col min-h-screen p-6 lg:p-8 relative z-10">
      <!-- Navbar -->
      <header
        class="glass-nav w-full flex flex-col md:flex-row justify-between items-center px-6 py-3 space-y-3 md:space-y-0 select-none z-50"
      >
        <!-- Logo -->
        <div class="flex items-center space-x-2.5">
          <span class="font-bold text-slate-900 text-xs tracking-wider uppercase"
            >Bioinformatics Docs</span
          >
        </div>
        <!-- Nav links -->
        <nav class="flex items-center space-x-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
          <a href="./index.html" class="hover:text-slate-900 transition-colors">Home</a>
          <a href="./learn.html" class="hover:text-slate-900 transition-colors">Modules</a>
          <a href="./pages/docs.html" class="hover:text-indigo-700 transition-colors text-indigo-600">Documentation &rarr;</a>
          <a href="https://github.com/ChakradhwajB/Bioinformatics-Docs" target="_blank" class="hover:text-slate-900 transition-colors flex items-center space-x-1">
            <svg class="w-3 h-3" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.54 2.87 8.39 6.84 9.75.5.09.68-.22.68-.49 0-.24-.01-.87-.01-1.71-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.57 2.34 1.12 2.91.85.09-.66.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.4 9.4 0 0 1 12 6.84c.85 0 1.71.12 2.51.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9 0 1.38-.01 2.49-.01 2.83 0 .27.18.59.69.49C19.14 20.65 22 16.8 22 12.26 22 6.58 17.52 2 12 2z"/></svg>
            <span>GitHub</span>
          </a>
        </nav>

      
        <!-- Server status -->
        <div
          class="flex items-center space-x-2 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-full"
        >
          <span
            id="server-status-dot"
            class="h-1.5 w-1.5 rounded-full bg-slate-400"
          ></span>
          <span
            id="server-status-text"
            class="text-[9px] font-bold text-slate-500 uppercase tracking-wider"
            >Checking...</span
          >
        </div>
      </header>

      <!-- Hero Section -->
      <section class="w-full max-w-4xl mx-auto px-4 py-12 text-center mt-6">
        <h1 class="text-4xl lg:text-5xl text-slate-900 tracking-tighter font-thin">Terminology Glossary</h1>
        <p class="text-[12px] text-slate-600 mt-4 max-w-2xl mx-auto leading-relaxed">Search through definitions of critical bioinformatics concepts, algorithms, and file formats.</p>
        
        <!-- Search Bar -->
        <div class="mt-8 relative max-w-md mx-auto">
          <input type="text" id="glossary-search" placeholder="Search for a term (e.g. K-mer, FASTA)..." class="w-full bg-white/60 backdrop-blur-sm border border-slate-200 rounded-full py-3 px-6 text-sm text-slate-700 shadow-sm focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400 transition-all placeholder-slate-400" />
          <svg class="w-4 h-4 absolute right-5 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </section>

      <!-- Glossary List -->
      <section class="max-w-4xl w-full mx-auto pb-16 px-4">
        <div id="glossary-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Populated dynamically via JS -->
        </div>
      </section>
    </div>

    <!-- Script to Render Glossary from global app.js -->
    <script src="./src/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("glossary-container");
        const searchInput = document.getElementById("glossary-search");

        function renderGlossary(filter = "") {
          container.innerHTML = "";
          const terms = Object.keys(window.GLOSSARY).sort();
          
          let count = 0;
          terms.forEach(term => {
            if (term.toLowerCase().includes(filter.toLowerCase()) || window.GLOSSARY[term].toLowerCase().includes(filter.toLowerCase())) {
              count++;
              const card = document.createElement("div");
              card.className = "bg-white/40 backdrop-blur-md border border-white/40 shadow-sm rounded-xl p-5 hover:bg-white/60 transition-colors";
              card.innerHTML = `
                <h3 class="text-lg font-semibold text-slate-900 mb-2">${term}</h3>
                <p class="text-xs text-slate-600 leading-relaxed">${window.GLOSSARY[term]}</p>
              `;
              container.appendChild(card);
            }
          });

          if (count === 0) {
            container.innerHTML = `<div class="col-span-full text-center text-slate-400 text-xs py-8">No matching terms found.</div>`;
          }
        }

        renderGlossary();

        searchInput.addEventListener("input", (e) => {
          renderGlossary(e.target.value);
        });
      });
    </script>
  </body>
</html>
